<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0A0A0A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Ketan Fit"/>
<title>Ketan Fit</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0A0A0A;--surface:#111;--card:#181818;--border:#242424;--border-h:#333;
  --accent:#C8F560;--accent-dim:#C8F56018;--accent-b:#C8F56040;
  --warn:#F5A623;--info:#60C8F5;--red:#F56060;
  --t1:#F0F0F0;--t2:#888;--t3:#444;
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px;min-height:100vh;overflow-x:hidden;}
button{font-family:var(--font);cursor:pointer;}
input,textarea,select{font-family:var(--font);}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;}
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;position:sticky;top:0;z-index:100;}
#header h1{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:-0.02em;}
#header h1 span{color:var(--accent);}
#content{flex:1;padding:16px;padding-bottom:80px;overflow-y:auto;}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;background:none;border:none;padding:10px 4px 8px;color:var(--t3);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{width:20px;height:20px;}
.nav-btn span{font-family:var(--mono);font-size:9px;letter-spacing:.05em;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.card.accent{border-color:var(--accent-b);}
.card.warn{border-color:#F5A62335;}
.card.info{border-color:#60C8F530;}

/* Chips */
.chip{display:inline-block;border-radius:5px;padding:2px 9px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;}
.chip.green{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-b);}
.chip.warn{background:#F5A62315;color:var(--warn);border:1px solid #F5A62335;}
.chip.info{background:#60C8F515;color:var(--info);border:1px solid #60C8F530;}
.chip.red{background:#F5606015;color:var(--red);border:1px solid #F5606035;}

/* Section header */
.sec-eyebrow{color:var(--accent);font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px;}
.sec-title{font-family:var(--display);font-size:19px;font-weight:700;letter-spacing:-.02em;margin-bottom:14px;}

/* Buttons */
.btn{border:none;border-radius:10px;padding:11px 18px;font-weight:600;font-size:13px;transition:all .15s;}
.btn-primary{background:var(--accent);color:#0A0A0A;}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border);}
.btn-danger{background:#F5606015;color:var(--red);border:1px solid #F5606035;}

/* Progress ring */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-label{position:absolute;text-align:center;}

/* Checkbox */
.check-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.check-row:last-child{border-bottom:none;}
.check-box{width:22px;height:22px;min-width:22px;border:2px solid var(--border-h);border-radius:6px;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;}
.check-box.done{background:var(--accent);border-color:var(--accent);}
.check-box svg{width:13px;height:13px;stroke:#0A0A0A;stroke-width:3;}
.check-label{flex:1;}
.check-label .name{color:var(--t1);font-weight:500;font-size:13.5px;margin-bottom:2px;}
.check-label .sub{color:var(--t3);font-size:11px;}
.check-label .done-text{color:var(--t3);text-decoration:line-through;}

/* Stat row */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.stat-label{color:var(--t2);font-size:13px;}
.stat-val{color:var(--t1);font-size:13px;font-family:var(--mono);}
.stat-val.accent{color:var(--accent);font-weight:600;}

/* Input */
.input-group{margin-bottom:14px;}
.input-group label{display:block;color:var(--t2);font-size:12px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.input-group input,.input-group select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--t1);font-size:14px;outline:none;transition:border .15s;}
.input-group input:focus,.input-group select:focus{border-color:var(--accent);}
.input-group select option{background:var(--card);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:#000a;z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border-h);border-radius:99px;margin:0 auto 18px;}

/* Toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0A0A0A;padding:9px 20px;border-radius:99px;font-weight:600;font-size:13px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}

/* Chart */
.chart-wrap{overflow-x:auto;padding-bottom:4px;}
.chart-wrap svg{min-width:260px;}

/* Exercise expand */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.ex-header{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;}
.ex-body{padding:0 14px 14px;border-top:1px solid var(--border);}
.ex-how{color:var(--t2);font-size:13px;line-height:1.7;margin-top:10px;}
.ex-cue{background:var(--accent-dim);border:1px solid var(--accent-b);border-radius:8px;padding:9px 12px;margin-top:10px;color:var(--accent);font-size:12px;font-weight:600;}

/* Streak */
.streak-dots{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.streak-dot{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);}
.streak-dot.done{background:var(--accent);color:#0A0A0A;}
.streak-dot.today{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);}
.streak-dot.missed{background:#1a1a1a;color:var(--t3);}
.streak-dot.future{background:#111;color:var(--t3);}

/* Phase badge */
.phase-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-dim);border:1px solid var(--accent-b);border-radius:8px;padding:5px 12px;}

/* Scroll snap days */
.days-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.days-scroll::-webkit-scrollbar{display:none;}
.day-pill{min-width:56px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);text-align:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.day-pill.active{background:var(--accent);border-color:var(--accent);}
.day-pill.active .dp-name,.day-pill.active .dp-day{color:#0A0A0A;}
.day-pill.completed{border-color:var(--accent-b);}
.day-pill.completed .dp-day{color:var(--accent);}
.dp-day{font-family:var(--mono);font-size:10px;color:var(--t3);}
.dp-name{font-size:11px;font-weight:600;color:var(--t2);margin-top:2px;}

/* Nutrition meal */
.meal-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:8px;}
.meal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.meal-time{font-size:13px;font-weight:600;}
.meal-items{list-style:none;}
.meal-items li{color:var(--t2);font-size:12.5px;line-height:1.85;display:flex;gap:6px;}
.meal-items li::before{content:'·';color:var(--t3);}

/* Weight log */
.log-entry{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.log-entry:last-child{border-bottom:none;}
.log-date{color:var(--t2);font-size:12px;font-family:var(--mono);}
.log-val{font-size:14px;font-weight:600;font-family:var(--mono);}

/* Fade in */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .2s ease;}

/* Utility */
.row{display:flex;align-items:center;}
.row.between{justify-content:space-between;}
.gap8{gap:8px;}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.mt16{margin-top:16px;}
.mt20{margin-top:20px;}
.mb8{margin-bottom:8px;}
.mb12{margin-bottom:12px;}
.mb16{margin-bottom:16px;}
.t2{color:var(--t2);}
.t3{color:var(--t3);}
.accent{color:var(--accent);}
.mono{font-family:var(--mono);}
.bold{font-weight:700;}
.small{font-size:12px;}
.divider{border-top:1px solid var(--border);margin:12px 0;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="row between">
      <h1>Ketan <span>Fit</span></h1>
      <div id="header-right"></div>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="navigate('home')" id="nav-home">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>HOME</span>
    </button>
    <button class="nav-btn" onclick="navigate('workout')" id="nav-workout">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      <span>WORKOUT</span>
    </button>
    <button class="nav-btn" onclick="navigate('cardio')" id="nav-cardio">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>CARDIO</span>
    </button>
    <button class="nav-btn" onclick="navigate('nutrition')" id="nav-nutrition">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>
      <span>NUTRITION</span>
    </button>
    <button class="nav-btn" onclick="navigate('stats')" id="nav-stats">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>STATS</span>
    </button>
  </nav>
</div>
<div id="toast"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
