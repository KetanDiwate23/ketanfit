<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0D0D0D"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Ketan Fit"/>
<title>Ketan Fit</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0D0D0D;
  --s1:#141414;
  --s2:#1C1C1C;
  --s3:#242424;
  --border:#2A2A2A;
  --borderh:#383838;
  --g:#B8FF3C;
  --gdim:#B8FF3C15;
  --gb:#B8FF3C30;
  --orange:#FF8C42;
  --blue:#4CC9F0;
  --red:#FF4757;
  --t1:#F5F5F5;
  --t2:#9A9A9A;
  --t3:#4A4A4A;
  --font:'Inter',system-ui,sans-serif;
  --mono:'Space Mono',monospace;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px;min-height:100vh;overflow-x:hidden;}
button,input,select,textarea{font-family:var(--font);}
img{max-width:100%;}

/* Scrollbar */
::-webkit-scrollbar{width:0;height:0;}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;position:relative;}

/* Header */
#header{background:var(--bg);padding:16px 20px 12px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:18px;font-weight:800;letter-spacing:-0.03em;}
.header-title span{color:var(--g);}
.header-sub{font-size:11px;color:var(--t3);font-family:var(--mono);margin-top:2px;letter-spacing:.04em;}

/* Content */
#content{flex:1;overflow-y:auto;padding:16px 16px 90px;}

/* Nav */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:100;padding:0 4px;}
.nb{flex:1;background:none;border:none;padding:10px 2px 12px;color:var(--t3);font-size:9px;font-family:var(--mono);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:color .15s;letter-spacing:.04em;}
.nb svg{width:21px;height:21px;stroke-width:1.8;}
.nb.active{color:var(--g);}

/* Cards */
.card{background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:16px;}
.card.g{border-color:var(--gb);}
.card.o{border-color:#FF8C4230;}
.card.b{border-color:#4CC9F030;}

/* Buttons */
.btn{border:none;border-radius:12px;padding:13px 20px;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s;letter-spacing:-.01em;}
.btn-g{background:var(--g);color:#0D0D0D;}
.btn-g:active{background:#a8f020;}
.btn-ghost{background:var(--s3);color:var(--t2);border:1px solid var(--border);}
.btn-ghost:active{background:var(--border);}
.btn-red{background:#FF475715;color:var(--red);border:1px solid #FF475730;}
.btn-full{width:100%;}

/* Chips */
.chip{display:inline-flex;align-items:center;border-radius:6px;padding:3px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;white-space:nowrap;}
.chip-g{background:var(--gdim);color:var(--g);border:1px solid var(--gb);}
.chip-o{background:#FF8C4215;color:var(--orange);border:1px solid #FF8C4230;}
.chip-b{background:#4CC9F015;color:var(--blue);border:1px solid #4CC9F030;}
.chip-gray{background:var(--s3);color:var(--t2);border:1px solid var(--border);}

/* Labels */
.label{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);}
.label-g{color:var(--g);}
.label-o{color:var(--orange);}
.label-b{color:var(--blue);}

/* Divider */
.div{border-top:1px solid var(--border);margin:12px 0;}

/* Input */
.inp-group{margin-bottom:12px;}
.inp-group label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;}
.inp-group input,.inp-group select{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--t1);font-size:14px;outline:none;transition:border .15s;}
.inp-group input:focus,.inp-group select:focus{border-color:var(--g);}
.inp-group select option{background:var(--s2);}

/* Check */
.chk{width:24px;height:24px;min-width:24px;border:2px solid var(--border);border-radius:7px;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.chk.on{background:var(--g);border-color:var(--g);}
.chk svg{width:13px;height:13px;stroke:#0D0D0D;stroke-width:3;fill:none;}

/* Exercise card */
.ex{background:var(--s2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .15s;}
.ex.done{border-color:var(--gb);opacity:.7;}
.ex.open{border-color:var(--gb);}
.ex-top{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;}
.ex-body{padding:12px 14px 14px;border-top:1px solid var(--border);}
.ex-how{color:var(--t2);font-size:13px;line-height:1.75;}
.ex-cue{background:var(--gdim);border:1px solid var(--gb);border-radius:8px;padding:9px 12px;margin-top:10px;color:var(--g);font-size:12px;font-weight:600;line-height:1.5;}

/* Today badge */
.today-badge{background:var(--g);color:#0D0D0D;border-radius:10px;padding:14px 16px;margin-bottom:16px;}
.today-badge .phase-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.7;margin-bottom:4px;}
.today-badge .day-title{font-size:22px;font-weight:900;letter-spacing:-.03em;margin-bottom:2px;}
.today-badge .day-sub{font-size:12px;opacity:.7;margin-bottom:10px;}
.today-badge .start-btn{background:#0D0D0D;color:var(--g);border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;width:100%;}

/* Progress bar */
.pbar{background:var(--s3);border-radius:99px;height:5px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width .8s ease;}

/* Stat box */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-box{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.stat-val{font-family:var(--mono);font-size:20px;font-weight:700;}
.stat-sub{color:var(--t3);font-size:11px;margin-top:3px;}

/* Week calendar */
.week-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px;}
.wc-day{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:8px 4px;text-align:center;}
.wc-day.active{background:var(--g);border-color:var(--g);}
.wc-day.done{border-color:var(--gb);}
.wc-day.rest{opacity:.4;}
.wc-name{font-size:9px;font-family:var(--mono);color:var(--t3);margin-bottom:4px;}
.wc-day.active .wc-name{color:#0D0D0D;opacity:.7;}
.wc-label{font-size:10px;font-weight:700;color:var(--t2);}
.wc-day.active .wc-label{color:#0D0D0D;}
.wc-day.done .wc-label{color:var(--g);}

/* Meal */
.meal{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;transition:border-color .15s;}
.meal.done{border-color:var(--gb);opacity:.75;}
.meal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.meal-time{font-size:13px;font-weight:600;}
.meal-items{list-style:none;}
.meal-items li{color:var(--t2);font-size:12.5px;line-height:1.9;display:flex;gap:6px;}
.meal-items li::before{content:'·';color:var(--t3);}

/* Chart */
.chart-scroll{overflow-x:auto;}
.chart-scroll svg{min-width:280px;}

/* Warmup */
.wu-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;gap:10px;}
.wu-row:not(:last-child){border-bottom:1px solid var(--border);}

/* Toast */
#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--g);color:#0D0D0D;padding:9px 22px;border-radius:99px;font-weight:700;font-size:13px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}

/* Onboard */
.onboard{min-height:80vh;display:flex;flex-direction:column;justify-content:center;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .22s ease;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.pulse{animation:pulse 2s infinite;}

/* Utils */
.row{display:flex;align-items:center;}
.between{justify-content:space-between;}
.gap6{gap:6px;}
.gap8{gap:8px;}
.gap10{gap:10px;}
.mt4{margin-top:4px;}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.mt16{margin-top:16px;}
.mt20{margin-top:20px;}
.mb4{margin-bottom:4px;}
.mb8{margin-bottom:8px;}
.mb12{margin-bottom:12px;}
.mb16{margin-bottom:16px;}
.mb20{margin-bottom:20px;}
.t2{color:var(--t2);}
.t3{color:var(--t3);}
.g{color:var(--g);}
.bold{font-weight:700;}
.mono{font-family:var(--mono);}
.small{font-size:12px;}
.xs{font-size:11px;}
.center{text-align:center;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-row">
      <div>
        <div class="header-title">Ketan <span>Fit</span></div>
        <div class="header-sub" id="header-sub">6-Month Transformation</div>
      </div>
      <div id="header-right"></div>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nb active" onclick="go('home')" id="nb-home">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>TODAY
    </button>
    <button class="nb" onclick="go('workout')" id="nb-workout">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6.5 6.5h11M6.5 17.5h11M4 12h16M2 9l2 3-2 3M22 9l-2 3 2 3"/></svg>WORKOUT
    </button>
    <button class="nb" onclick="go('cardio')" id="nb-cardio">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>CARDIO
    </button>
    <button class="nb" onclick="go('nutrition')" id="nb-nutrition">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>MEALS
    </button>
    <button class="nb" onclick="go('stats')" id="nb-stats">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>STATS
    </button>
  </nav>
</div>
<div id="toast"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
